<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kid Focus</title>
<style>
  body {
    width: 210px;
    margin: 0;
    padding: 14px;
    background: #0f1419;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-align: center;
    color: #e8eaed;
  }

  .face {
    font-size: 10px;
    line-height: 1.3;
    font-family: monospace;
    background: #1e2a3a;
    border: 2px solid #5b6eee;
    padding: 6px;
    border-radius: 4px;
    white-space: pre;
    text-align: left;
    display: inline-block;
    color: #e8eaed;
  }

  h2 {
    font-size: 12px;
    margin: 10px 0 2px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a8aeb8;
  }

  .tagline {
    font-size: 9px;
    color: #6b7280;
    margin: 0 0 14px;
  }

  .divider {
    border: none;
    border-top: 1px solid #252d3d;
    margin: 12px 0 8px;
  }

  .section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .mode-buttons {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  button {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid #5b6eee;
    background: #1e2a3a;
    color: #e8eaed;
    transition: all 0.2s;
  }
  button:hover { background: #2a3a52; }

  button.active-focus {
    background: #10b981;
    border-color: #10b981;
    color: #0f1419;
    font-weight: bold;
  }

  button.active-unproductive {
    background: #ef4444;
    border-color: #ef4444;
    color: #fff;
    font-weight: bold;
  }

  button.active-nudges-on {
    background: #10b981;
    border-color: #10b981;
    color: #0f1419;
    font-weight: bold;
  }

  button.active-nudges-off {
    background: #ef4444;
    border-color: #ef4444;
    color: #fff;
    font-weight: bold;
  }

  #btn-meditate {
    margin-top: 0;
    background: #5b6eee;
    border-color: #5b6eee;
    color: #0f1419;
  }
  #btn-meditate:hover { background: #4a5cdb; }

  #status {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  #nudgesStatus {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  #presenceStatus {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  .timing-grid {
    display: grid;
    gap: 6px;
    margin-top: 6px;
    text-align: left;
  }

  .timing-row {
    display: grid;
    grid-template-columns: 1fr 68px;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: #a8aeb8;
  }

  .timing-row input {
    width: 100%;
    box-sizing: border-box;
    padding: 5px 6px;
    border-radius: 5px;
    border: 1px solid #334155;
    background: #111827;
    color: #e8eaed;
    font-size: 10px;
  }

  #saveTimingBtn {
    margin-top: 8px;
    background: #f59e0b;
    border-color: #f59e0b;
    color: #0f1419;
    font-weight: 700;
  }

  #timingStatus {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  .tab-nav {
    display: flex;
    gap: 4px;
    margin: 8px 0 10px;
  }

  .tab-btn {
    flex: 1;
    padding: 6px;
    font-size: 10px;
    border-radius: 5px;
    border: 1px solid #334155;
    background: #111827;
    color: #a8aeb8;
    cursor: pointer;
  }

  .tab-btn.active {
    background: #5b6eee;
    border-color: #5b6eee;
    color: #0f1419;
    font-weight: 700;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }
</style>
</head>
<body>

<div class="face">  .-----.
 /  o o  \
|    ^    |
 \ \___/ /
  '-----'
  |     |
 _|_____|_</div>

<h2>Kid Focus</h2>
<p class="tagline">Productivity Buddy</p>

<div class="tab-nav">
  <button id="mainTabBtn" class="tab-btn active">Main</button>
  <button id="settingsTabBtn" class="tab-btn">Settings</button>
</div>

<div id="mainTabExtras" class="tab-content active">

<hr class="divider">

<div class="section-label">Mode</div>
<div class="mode-buttons">
  <button id="focusBtn">Focus</button>
  <button id="unproductiveBtn">Unproductive</button>
</div>
<div id="status"></div>

<hr class="divider">

<div class="section-label">Smart Nudges</div>
<div class="mode-buttons">
  <button id="nudgesToggle">Nudges: Off</button>
</div>
<div id="nudgesStatus"></div>

<div class="section-label">Presence Check-ins</div>
<div class="mode-buttons">
  <button id="presenceToggle">Check-ins: Off</button>
</div>
<div id="presenceStatus"></div>

</div>

<div id="settingsTab" class="tab-content">

<div class="section-label">Timing (Seconds)</div>
<div class="timing-grid">
  <label class="timing-row" for="productiveSeconds">
    <span>Break after productive</span>
    <input id="productiveSeconds" type="number" min="1" step="1" value="10">
  </label>
  <label class="timing-row" for="unproductiveSeconds">
    <span>Work nudge after unproductive</span>
    <input id="unproductiveSeconds" type="number" min="1" step="1" value="10">
  </label>
  <label class="timing-row" for="presenceSeconds">
    <span>Phone check-in after idle</span>
    <input id="presenceSeconds" type="number" min="1" step="1" value="5">
  </label>
</div>
<div class="mode-buttons">
  <button id="saveTimingBtn">Save Timings</button>
</div>
<div id="timingStatus"></div>

</div>

<div id="mainTab" class="tab-content active">

<hr class="divider">

<div class="section-label">Take a Break</div>
<div class="mode-buttons">
  <button id="btn-meditate">🧘 Meditation Space</button>
</div>

</div>

<script src="popup.js"></script>
</body>
</html>
