<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chudjak</title>
<style>
  body {
    width: 200px;
    margin: 0;
    padding: 12px;
    background: #f0ece0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: #222;
  }
 
  .face {
    font-size: 11px;
    line-height: 1.3;
    font-family: monospace;
    background: #ddd8c4;
    border: 1px solid #bbb;
    padding: 6px;
    border-radius: 4px;
    white-space: pre;
    text-align: left;
    display: inline-block;
  }
 
  h2 {
    font-size: 13px;
    margin: 8px 0 4px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #444;
  }
 
  p {
    font-size: 10px;
    color: #888;
    margin: 0 0 10px;
  }
 
  button {
    width: 100%;
    padding: 6px;
    margin-top: 4px;
    font-size: 11px;
    background: #ddd8c4;
    border: 1px solid #aaa;
    border-radius: 3px;
    cursor: pointer;
  }
 
  button:hover { background: #ccc8b4; }
</style>
</head>
