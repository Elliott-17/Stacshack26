<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChromeRot</title>
<style>
  body {
    width: 210px;
    margin: 0;
    padding: 14px;
    background: #0f0f1a;
    font-family: Arial, sans-serif;
    text-align: center;
    color: #ddd;
  }

  .face {
    font-size: 10px;
    line-height: 1.3;
    font-family: monospace;
    background: #1a1a2e;
    border: 1px solid #333;
    padding: 6px;
    border-radius: 4px;
    white-space: pre;
    text-align: left;
    display: inline-block;
    color: #aaa;
  }

  h2 {
    font-size: 12px;
    margin: 10px 0 2px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
  }

  .tagline {
    font-size: 9px;
    color: #555;
    margin: 0 0 14px;
  }

  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 12px 0 8px;
  }

  .section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #444;
    margin-bottom: 6px;
  }

  .status-pill {
    display: inline-block;
    font-size: 9px;
    background: #1a2a1a;
    border: 1px solid #2a4a2a;
    color: #5a9a5a;
    border-radius: 10px;
    padding: 2px 8px;
    margin-bottom: 10px;
  }

  button {
    width: 100%;
    padding: 7px;
    margin-top: 5px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid #333;
    background: #1a1a2e;
    color: #bbb;
    transition: background 0.2s;
  }
  button:hover { background: #252540; }

  #btn-meditate {
    background: rgba(80, 50, 140, 0.4);
    border-color: rgba(140, 100, 220, 0.5);
    color: #c8b8f0;
  }
  #btn-meditate:hover { background: rgba(80, 50, 140, 0.65); }
</style>
</head>
<body>

<div class="face">  .-----.
 /  o o  \
|    ^    |
 \ \___/ /
  '-----'</div>

<h2>ChromeRot</h2>
<p class="tagline">Anti-Productivity Tool</p>

<div class="section-label">Distraction Mode</div>
<div class="status-pill">● Active on StudRes</div>

<hr class="divider">

<div class="section-label">Take a Break</div>
<button id="btn-meditate">🧘 Open Meditation Space</button>

<script src="popup.js"></script>
</body>
</html>
