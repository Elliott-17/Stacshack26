<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChromeRot</title>
<style>
  body {
    width: 210px;
    margin: 0;
    padding: 14px;
    background: #0f0f1a;
    font-family: Arial, sans-serif;
    text-align: center;
    color: #ddd;
  }

  .face {
    font-size: 10px;
    line-height: 1.3;
    font-family: monospace;
    background: #1a1a2e;
    border: 1px solid #333;
    padding: 6px;
    border-radius: 4px;
    white-space: pre;
    text-align: left;
    display: inline-block;
    color: #aaa;
  }

  h2 {
    font-size: 12px;
    margin: 10px 0 2px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
  }

  .tagline {
    font-size: 9px;
    color: #555;
    margin: 0 0 14px;
  }

  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 12px 0 8px;
  }

  .section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #444;
    margin-bottom: 6px;
  }

  .mode-buttons {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  button {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid #333;
    background: #1a1a2e;
    color: #bbb;
    transition: background 0.2s;
  }
  button:hover { background: #252540; }

  button.active-focus {
    background: rgba(50, 120, 50, 0.4);
    border-color: rgba(100, 180, 100, 0.5);
    color: #a8d8a8;
    font-weight: bold;
  }

  button.active-unproductive {
    background: rgba(140, 50, 50, 0.4);
    border-color: rgba(180, 100, 100, 0.5);
    color: #d8a8a8;
    font-weight: bold;
  }

  #btn-meditate {
    margin-top: 0;
    background: rgba(80, 50, 140, 0.4);
    border-color: rgba(140, 100, 220, 0.5);
    color: #c8b8f0;
  }
  #btn-meditate:hover { background: rgba(80, 50, 140, 0.65); }

  #status {
    font-size: 9px;
    color: #555;
    min-height: 14px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="face">  .-----.
 /  o o  \
|    ^    |
 \ \___/ /
  '-----'
  |     |
 _|_____|_</div>

<h2>ChromeRot</h2>
<p class="tagline">Anti-Productivity Tool</p>

<hr class="divider">

<div class="section-label">Mode</div>
<div class="mode-buttons">
  <button id="focusBtn">Focus</button>
  <button id="unproductiveBtn">Unproductive</button>
</div>
<div id="status"></div>

<hr class="divider">

<div class="section-label">Take a Break</div>
<div class="mode-buttons">
  <button id="btn-meditate">🧘 Meditation Space</button>
</div>

<script src="popup.js"></script>
</body>
</html>
