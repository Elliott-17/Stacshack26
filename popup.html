<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChromeRot</title>
<style>
  body {
    width: 210px;
    margin: 0;
    padding: 14px;
    background: #0f1419;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    text-align: center;
    color: #e8eaed;
  }

  .face {
    font-size: 10px;
    line-height: 1.3;
    font-family: monospace;
    background: #1e2a3a;
    border: 2px solid #5b6eee;
    padding: 6px;
    border-radius: 4px;
    white-space: pre;
    text-align: left;
    display: inline-block;
    color: #e8eaed;
  }

  h2 {
    font-size: 12px;
    margin: 10px 0 2px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a8aeb8;
  }

  .tagline {
    font-size: 9px;
    color: #6b7280;
    margin: 0 0 14px;
  }

  .divider {
    border: none;
    border-top: 1px solid #252d3d;
    margin: 12px 0 8px;
  }

  .section-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .mode-buttons {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  button {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid #5b6eee;
    background: #1e2a3a;
    color: #e8eaed;
    transition: all 0.2s;
  }
  button:hover { background: #2a3a52; }

  button.active-focus {
    background: #10b981;
    border-color: #10b981;
    color: #0f1419;
    font-weight: bold;
  }

  button.active-unproductive {
    background: #ef4444;
    border-color: #ef4444;
    color: #fff;
    font-weight: bold;
  }

  button.active-nudges-on {
    background: #10b981;
    border-color: #10b981;
    color: #0f1419;
    font-weight: bold;
  }

  button.active-nudges-off {
    background: #ef4444;
    border-color: #ef4444;
    color: #fff;
    font-weight: bold;
  }

  #btn-meditate {
    margin-top: 0;
    background: #5b6eee;
    border-color: #5b6eee;
    color: #0f1419;
  }
  #btn-meditate:hover { background: #4a5cdb; }

  #status {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  #nudgesStatus {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }

  #presenceStatus {
    font-size: 9px;
    color: #6b7280;
    min-height: 14px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="face">  .-----.
 /  o o  \
|    ^    |
 \ \___/ /
  '-----'
  |     |
 _|_____|_</div>

<h2>ChromeRot</h2>
<p class="tagline">Anti-Productivity Tool</p>

<hr class="divider">

<div class="section-label">Mode</div>
<div class="mode-buttons">
  <button id="focusBtn">Focus</button>
  <button id="unproductiveBtn">Unproductive</button>
</div>
<div id="status"></div>

<hr class="divider">

<div class="section-label">Smart Nudges</div>
<div class="mode-buttons">
  <button id="nudgesToggle">Nudges: Off</button>
</div>
<div id="nudgesStatus"></div>

<div class="section-label">Presence Check-ins</div>
<div class="mode-buttons">
  <button id="presenceToggle">Check-ins: Off</button>
</div>
<div id="presenceStatus"></div>

<hr class="divider">

<div class="section-label">Take a Break</div>
<div class="mode-buttons">
  <button id="btn-meditate">🧘 Meditation Space</button>
</div>

<script src="popup.js"></script>
</body>
</html>
